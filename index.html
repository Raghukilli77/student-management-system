
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
</head>
<body>

    <!-- Main Header -->
    <header>
        <h1>Student Management System</h1>
    </header>

    <!-- Form Section -->
    <main>
        <form>
            <fieldset>
                <legend>Add New Student Details</legend>

                <!-- Input Group: Name -->
                <div>
                    <label for="studentName">Student Name:</label>
                    <input type="text" id="studentName" placeholder="eg: raghu" required>
                </div>

                <!-- Input Group: Roll Number -->
                <div>
                    <label for="studentRoll">Roll Number:</label>
                    <input type="text" id="studentRoll" placeholder="eg: 25P35A0577" required>
                </div>

                <!-- Input Group: Branch Dropdown -->
                <div>
                    <label for="studentBranch">Select your Branch:</label>
                    <select id="studentBranch" required>
                        <option value="" disabled selected hidden>Choose your branch...</option>
                        <option value="CSE">CSE (Computer Science)</option>
                        <option value="MECH">MECH (Mechanical)</option>
                        <option value="ECE">ECE (Electronics & Communication)</option>
                        <option value="IT">IT (Information Technology)</option>
                        <option value="CIVIL">CIVIL (Civil Engineering)</option>
                        <option value="EEE">EEE (Electrical & Electronics)</option>
                        <option value="AI-ML">AI & ML (Artificial Intelligence)</option>
                        <option value="DS">DS (Data Science)</option>
                    </select>
                </div>

                <!-- Input Group: Cgpa -->
                <div>
                    <label for="studentMarks">Cgpa:</label>
                    <input type="number" id="studentCgpa" min="0" max="10" placeholder="0-10" required>
                </div>

                <!-- Form Action -->
                <div>
                    <button type="submit" id="addBtn">Add Student</button>
                </div>
            </fieldset>
        </form>

        <hr>

        <!-- Student Data Display Section -->
        <table border="1" id="studentTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Roll Number</th>
                    <th>Branch</th>
                    <th>Cgpa</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <!-- <tbody>
                <tr>
                    <td>1</td>
                    <td>Raghu</td>
                    <td>25P35A0577</td>
                    <td>CSE</td>
                    <td>8.43</td>
                    <td>
                        <button type="button">Delete</button>
                    </td>
                </tr>
            </tbody> -->
        </table>
    </main>

</body>
</html>
